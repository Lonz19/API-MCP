name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Check formatting
        run: ruff format --check app/ tests/
      - name: Check linting
        run: ruff check app/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80
        env:
          APP_ENV: testing
          API_KEY: test-key
          GEMINI_API_KEY: fake-key

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check README exists and is non-empty
        run: |
          if [ ! -s README.md ]; then
            echo "ERROR: README.md is missing or empty"
            exit 1
          fi
      - name: Check ARCHITECTURE.md exists
        run: |
          if [ ! -s ARCHITECTURE.md ]; then
            echo "ERROR: ARCHITECTURE.md is missing or empty"
            exit 1
          fi

  deploy:
    name: Deploy to Replit
    runs-on: ubuntu-latest
    needs: [lint, test, docs-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:deploy --force
